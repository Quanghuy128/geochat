name: DB Migrate

# Áp migration Supabase lên DB thật — CÓ KIỂM SOÁT (bài học DB incident, xem CLAUDE.md).
# An toàn theo tầng:
#   1. Chỉ chạy sau khi đã merge vào master (KHÔNG chạy trên PR).
#   2. Chỉ chạy khi có file migration thay đổi.
#   3. Gắn environment `production-db` (yêu cầu reviewer duyệt tay) → người bấm Approve trước khi SQL chạy.
#   4. `db push --dry-run` LIỆT KÊ các migration file sẽ áp (không phải diff schema thật)
#      → reviewer đọc danh sách + tự đối chiếu trước khi duyệt.
#
# ⚠️ TRƯỚC LẦN CHẠY ĐẦU: các migration 0001–0003 vốn được paste tay vào SQL Editor,
#    nên bảng lịch sử migration của CLI rỗng → `db push` đầu tiên sẽ áp LẠI cả 3 lên DB thật.
#    Cả 3 idempotent (if exists / if not exists) nên không phá dữ liệu, NHƯNG vẫn phải baseline
#    trước (xem README mục "Reconcile migration history") rồi mới bật workflow này.

on:
  push:
    branches: [master]
    paths:
      - "supabase/migrations/**"

jobs:
  migrate:
    name: Push migrations (gated)
    runs-on: ubuntu-latest
    # Environment bảo vệ: cấu hình required reviewer ở GitHub > Settings > Environments.
    environment: production-db
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Dry-run (liệt kê migration sẽ áp — reviewer đọc trước khi duyệt)
        run: supabase db push --dry-run

      - name: Apply migrations
        run: supabase db push

      # Báo Discord khi migration đã áp lên DB thật (sự kiện nhạy cảm — cần biết ngay).
      # Skip êm nếu chưa set secret. (if step không đọc được env step → check rỗng trong run.)
      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then echo "DISCORD_WEBHOOK_URL chưa set — bỏ qua."; exit 0; fi
          if [ "$STATUS" = "success" ]; then COLOR=3066993; ICON="🗄️✅"; else COLOR=15158332; ICON="🗄️❌"; fi
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<JSON
          {
            "embeds": [{
              "title": "$ICON DB Migrate — ${STATUS}",
              "color": ${COLOR},
              "description": "Migration Supabase đã áp lên DB production.",
              "fields": [
                { "name": "Repo", "value": "${{ github.repository }}", "inline": true },
                { "name": "Commit", "value": "[\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})", "inline": true }
              ],
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }]
          }
          JSON
