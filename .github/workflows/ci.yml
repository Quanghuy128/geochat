name: CI

# Cổng chất lượng cho mọi PR + push lên master (khớp stage "test + coverage" của /ship).
# Hôm nay chỉ có lint thật + typecheck + build; khi cài Vitest/Playwright thì bỏ comment bước test.

on:
  pull_request:
  push:
    branches: [master]

# Hủy run cũ khi có commit mới trên cùng ref (tiết kiệm CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Placeholder để build không fail khi collect page data.
          # Đây là anon key public — KHÔNG bí mật. Giá trị thật cấu hình ở Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      # TODO: bật khi cài Vitest/Playwright (xem CLAUDE.md — stack Test).
      # - name: Test
      #   run: npm test

      # Thông báo kết quả vào Discord (cả pass lẫn fail). Skip êm nếu chưa set secret.
      # LƯU Ý: if của step KHÔNG đọc được env định nghĩa trong chính step đó → check rỗng phải nằm trong run.
      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then echo "DISCORD_WEBHOOK_URL chưa set — bỏ qua."; exit 0; fi
          if [ "$STATUS" = "success" ]; then COLOR=3066993; ICON="✅"; else COLOR=15158332; ICON="❌"; fi
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<JSON
          {
            "embeds": [{
              "title": "$ICON CI — ${STATUS}",
              "color": ${COLOR},
              "fields": [
                { "name": "Repo", "value": "${{ github.repository }}", "inline": true },
                { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                { "name": "Commit", "value": "[\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})", "inline": false }
              ],
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }]
          }
          JSON
